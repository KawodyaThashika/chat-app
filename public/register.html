<!DOCTYPE html>
<html>
<head>
    <title>Chat Registration</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="background">
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
</div>

<div class="login-container">
    <h2>Chat Registration</h2>

    <form action="/register" method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="email" name="email" placeholder="Email" required>

        <!-- Password with toggle -->
        <div style="position: relative;">
            <input type="password" id="regPassword" name="password" placeholder="Password" required>

            <i class="fa-solid fa-eye"
            onclick="togglePassword('regPassword', this)"
            style="position:absolute; right:10px; top:12px; cursor:pointer; color:#aaa;">
            </i>
        </div>

        <button type="submit">Register</button>
    </form>

    <p style="text-align:center; margin-top: 15px; color: #ccc;">
        Already have an account?
        <a href="/login.html" style="color: #fff; font-weight: bold; text-decoration: underline;">Login</a>
    </p>
</div>

<script>


    function togglePassword(fieldId, icon) {
    const input = document.getElementById(fieldId);

    if (input.type === "password") {
        input.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    } else {
        input.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
}


</script>

</body>
</html>
