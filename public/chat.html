<!DOCTYPE html>
<html>
<head>
    <title>Chat Application</title>
    <!-- ADDED: viewport meta — critical for mobile scaling -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background">
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
</div>

<div class="chat-container">

    <!-- ADDED: sidebar overlay backdrop (mobile only, closes sidebar on tap) -->
    <div id="sidebar-overlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

    <div class="sidebar" id="sidebar">

        <!-- ADDED: close button inside sidebar for mobile -->
        <button class="sidebar-close-btn" onclick="closeSidebar()">✕</button>

        <!-- My Profile Card -->
        <div class="my-profile-card" id="my-profile-card" onclick="openProfileModal()">
            <div class="my-profile-avatar" id="sidebar-avatar">?</div>
            <div class="my-profile-info">
                <div class="my-profile-name" id="sidebar-name">...</div>
                <div class="my-profile-status" id="sidebar-status">Hey there! 👋</div>
            </div>
            <span class="my-profile-edit-icon">✏️</span>
        </div>

        <h3>Users</h3>

        <div class="chat-mode-btns">
            <button id="groupBtn" class="mode-btn active" onclick="switchMode('group')">
                👥 Group Chat
            </button>
            <button id="privateBtn" class="mode-btn" onclick="switchMode('private')">
                🔒 Private Chat
            </button>
            <button id="savedBtn" class="mode-btn" onclick="switchMode('saved')">
                📌 Saved Messages
            </button>
        </div>

        <div id="users"></div>
    </div>

    <div class="chat-area">

        <!-- CHANGED: header now has a hamburger button on the left for mobile -->
        <div class="chat-header" id="chat-header">
            <button class="hamburger-btn" onclick="openSidebar()" title="Menu">☰</button>
            <span id="chat-header-text">👥 Group Chat</span>
        </div>

        <div id="messages" class="messages"></div>

        <div id="typing-indicator" class="typing-indicator"></div>

        <div id="reply-box">
            <div id="reply-box-text"></div>
            <button onclick="cancelReply()">✕</button>
        </div>

        <div class="chat-input">
            <input type="file" id="image-file-input" accept="image/*" style="display:none;">
            <div id="image-preview-area" style="display:none;align-items:center;padding:4px 8px;background:#f0f0f0;border-radius:8px;margin-bottom:4px;"></div>
            <div style="display:flex;align-items:center;gap:6px;width:100%;">
                <button class="img-btn" onclick="openImagePicker()" title="Send image">🖼️</button>
                <input id="msg" placeholder="Type your message..."
                       onkeypress="if(event.key==='Enter'){sendMsg();}">
                <button onclick="sendMsg()">Send</button>
            </div>
        </div>
    </div>

</div>

<!-- Fullscreen image overlay -->
<div id="image-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;align-items:center;justify-content:center;" onclick="closeImageOverlay()">
    <img id="image-overlay-img" src="" style="max-width:90vw;max-height:90vh;border-radius:10px;box-shadow:0 4px 30px rgba(0,0,0,0.5);">
</div>

<!-- ── Profile Edit Modal ── -->
<div id="profile-modal" class="profile-modal-overlay" onclick="closeProfileModal(event)">
    <div class="profile-modal">
        <button class="profile-modal-close" onclick="closeProfileModal()">✕</button>
        <h2 class="profile-modal-title">My Profile</h2>

        <!-- Avatar preview + upload -->
        <div class="profile-avatar-section">
            <div class="profile-avatar-big" id="modal-avatar">?</div>
            <button class="profile-avatar-change-btn" onclick="document.getElementById('avatar-file-input').click()">
                📷 Change Photo
            </button>
            <input type="file" id="avatar-file-input" accept="image/*" style="display:none">
        </div>

        <div class="profile-fields">
            <label class="profile-label">Username</label>
            <input class="profile-input" id="profile-username-display" type="text" disabled>

            <label class="profile-label">Bio</label>
            <textarea class="profile-input profile-bio-input" id="profile-bio" placeholder="Write something about yourself..." rows="3" maxlength="150"></textarea>

            <label class="profile-label">Status</label>
            <div class="profile-status-options" id="profile-status-options">
                <button class="status-opt" data-status="online">🟢 Online</button>
                <button class="status-opt" data-status="busy">🔴 Busy</button>
                <button class="status-opt" data-status="away">🟡 Away</button>
                <button class="status-opt" data-status="invisible">⚫ Invisible</button>
            </div>
        </div>

        <button class="profile-save-btn" onclick="saveProfile()">Save Changes</button>
    </div>
</div>

<!-- ── View Other User Profile Modal ── -->
<div id="view-profile-modal" class="profile-modal-overlay" onclick="closeViewProfile(event)">
    <div class="profile-modal">
        <button class="profile-modal-close" onclick="closeViewProfile()">✕</button>
        <div class="profile-avatar-section">
            <div class="profile-avatar-big" id="view-avatar">?</div>
        </div>
        <div class="view-profile-name" id="view-name"></div>
        <div class="view-profile-status-badge" id="view-status-badge"></div>
        <div class="view-profile-bio" id="view-bio"></div>
        <button class="profile-save-btn" id="view-chat-btn" style="margin-top:16px">💬 Send Message</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>
</body>
</html>
