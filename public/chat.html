<!DOCTYPE html>
<html>
<head>
    <title>Chat Application</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background">
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
</div>

<div class="chat-container">

    <div class="sidebar">
        <h3>Users</h3>

        <div class="chat-mode-btns">
            <button id="groupBtn" class="mode-btn active" onclick="switchMode('group')">
                👥 Group Chat
            </button>
            <button id="privateBtn" class="mode-btn" onclick="switchMode('private')">
                🔒 Private Chat
            </button>
            <!-- NEW: Saved Messages button -->
            <button id="savedBtn" class="mode-btn" onclick="switchMode('saved')">
                📌 Saved Messages
            </button>
        </div>

        <div id="users"></div>
    </div>

    <div class="chat-area">
        <div class="chat-header" id="chat-header">👥 Group Chat</div>

        <div id="messages" class="messages"></div>

        <div id="typing-indicator" class="typing-indicator"></div>

        <div id="reply-box">
            <div id="reply-box-text"></div>
            <button onclick="cancelReply()">✕</button>
        </div>

        <div class="chat-input">
            <input type="file" id="image-file-input" accept="image/*" style="display:none;">
            <div id="image-preview-area" style="display:none;align-items:center;padding:4px 8px;background:#f0f0f0;border-radius:8px;margin-bottom:4px;"></div>
            <div style="display:flex;align-items:center;gap:6px;width:100%;">
                <button class="img-btn" onclick="openImagePicker()" title="Send image">🖼️</button>
                <input id="msg" placeholder="Type your message..."
                       onkeypress="if(event.key==='Enter'){sendMsg();}">
                <button onclick="sendMsg()">Send</button>
            </div>
        </div>
    </div>

</div>

<!-- Fullscreen image overlay -->
<div id="image-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;align-items:center;justify-content:center;" onclick="closeImageOverlay()">
    <img id="image-overlay-img" src="" style="max-width:90vw;max-height:90vh;border-radius:10px;box-shadow:0 4px 30px rgba(0,0,0,0.5);">
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>
</body>
</html>
