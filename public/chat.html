<!DOCTYPE html>
<html>
<head>
    <title>Chat Application</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background">
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
</div>

<div class="chat-container">

    <div class="sidebar">
        <h3>Users</h3>

        <div class="chat-mode-btns">
            <button id="groupBtn" class="mode-btn active" onclick="switchMode('group')">
                👥 Group Chat
            </button>
            <button id="privateBtn" class="mode-btn" onclick="switchMode('private')">
                🔒 Private Chat
            </button>
        </div>

        <div id="users"></div>
    </div>

    <div class="chat-area">
        <div class="chat-header" id="chat-header">👥 Group Chat</div>

        <div id="messages" class="messages"></div>

        <div id="typing-indicator" class="typing-indicator"></div>

        <div id="reply-box">
            <div id="reply-box-text"></div>
            <button onclick="cancelReply()">✕</button>
        </div>

        <div class="chat-input">
            <input id="msg" placeholder="Type your message..."
                   onkeypress="if(event.key==='Enter'){sendMsg();}">
            <button onclick="sendMsg()">Send</button>
        </div>
    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>
</body>
</html>
