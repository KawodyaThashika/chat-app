<!DOCTYPE html>
<html>
<head>
    <title>Chat Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="background">
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
</div>

<div class="login-container">
    <h2>Chat Login</h2>

    <form id="loginForm" action="/login" method="POST">
        <input type="email" id="email" name="email" placeholder="Email" required>

        <!-- Password with toggle -->
        <div style="position: relative;">
            <input type="password" id="password" name="password" placeholder="Password" required>

            <i class="fa-solid fa-eye"
            onclick="togglePassword('password', this)"
            style="position:absolute; right:10px; top:12px; cursor:pointer; color:#aaa;">
            </i>
        </div>

        <button type="submit">Login</button>
    </form>

    <p style="text-align:center; margin-top: 15px; color: #ccc;">
        Don't have an account?
        <a href="/register.html" style="color: #fff; font-weight: bold; text-decoration: underline;">Register</a>
    </p>
</div>

<script>

function togglePassword(fieldId, icon) {
    const input = document.getElementById(fieldId);

    if (input.type === "password") {
        input.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    } else {
        input.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
}

// Login form submit
document.getElementById("loginForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const res = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: `email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`
    });

    if(res.redirected){
        window.location.href = res.url;
    } else {
        const text = await res.text();
        alert(text);
    }

});
</script>

</body>
</html>
